name: Go SDK Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(go test -run '^TestPackageVersionConstant$' -count=1 -v ./... 2>&1 | sed -n 's/.*PACKAGE_VERSION=//p' | tail -n 1)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "Tag version ${TAG_VERSION} does not match client.go PackageVersion ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="${VERSION}" '
            $0 == "## " version || $0 == "## v" version { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [[ ! -s RELEASE_NOTES.md ]]; then
            printf 'Release %s\n' "${VERSION}" > RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "Cloptima Go SDK ${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md
